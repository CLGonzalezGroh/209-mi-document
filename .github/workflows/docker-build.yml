# ============================================
# GitHub Actions: Build & Push imagen Docker
# Copiar este archivo a cada repo de servicio:
#   .github/workflows/docker-build.yml
#
# Requiere: Settings → Actions → General →
#   Workflow permissions: "Read and write permissions"
# ============================================

name: Build & Push Docker Image

on:
  push:
    branches: [dev]
  workflow_dispatch: # Permite ejecutar manualmente

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=

      - name: Create .npmrc for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PAT_GITHUB_PACKAGES }}" > /tmp/.npmrc
          echo "@CLGonzalezGroh:registry=https://npm.pkg.github.com" >> /tmp/.npmrc

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            npmrc=/tmp/.npmrc

      - name: Notify supergraph update
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PAT_GITHUB_PACKAGES }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/CLGonzalezGroh/210-mi-deploy/dispatches" \
            -d '{"event_type":"schema-updated","client_payload":{"repo":"${{ github.repository }}"}}'
